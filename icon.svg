<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1b223c"/>
      <stop offset="60%" stop-color="#0a0d18"/>
      <stop offset="100%" stop-color="#05060b"/>
    </radialGradient>
    
    <!-- Gold Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff1a6"/>
      <stop offset="50%" stop-color="#e5c158"/>
      <stop offset="100%" stop-color="#ab822d"/>
    </linearGradient>
    
    <!-- Abyss Teal Glow -->
    <linearGradient id="teal-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#005a5b"/>
      <stop offset="50%" stop-color="#00a896"/>
      <stop offset="100%" stop-color="#78e7d4"/>
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg-grad)"/>
  
  <!-- Outer Styled Ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#gold-grad)" stroke-width="4" stroke-dasharray="10 5" opacity="0.6"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#gold-grad)" stroke-width="2" opacity="0.3"/>
  
  <!-- Abyss Core (Glow) -->
  <circle cx="256" cy="256" r="90" fill="url(#teal-grad)" opacity="0.15" filter="url(#glow)"/>
  
  <!-- Stylized Abyssal Rune/Sigil -->
  <g filter="url(#glow)">
    <!-- Vertical Sword/Splinter -->
    <path d="M 256,60 L 270,220 L 256,290 L 242,220 Z" fill="url(#gold-grad)"/>
    <path d="M 256,290 L 265,420 L 256,450 L 247,420 Z" fill="url(#gold-grad)"/>
    
    <!-- Horizontal Cross Guard -->
    <path d="M 120,220 L 256,242 L 392,220 L 256,258 Z" fill="url(#gold-grad)"/>
    
    <!-- Abyss Teal Rune Wings -->
    <path d="M 256,256 C 210,180 140,200 140,290 C 140,360 210,340 256,256 Z" fill="url(#teal-grad)" opacity="0.8"/>
    <path d="M 256,256 C 302,180 372,200 372,290 C 372,360 302,340 256,256 Z" fill="url(#teal-grad)" opacity="0.8"/>
    
    <!-- Center Eye/Core -->
    <circle cx="256" cy="256" r="18" fill="#05060b" stroke="url(#gold-grad)" stroke-width="3"/>
    <polygon points="256,244 262,256 256,268 250,256" fill="url(#teal-grad)"/>
  </g>
</svg>
